# ============================================================
# mysql-deployment.yaml
#
# MySQL StatefulSet with Vault secret injection
# ============================================================

apiVersion: apps/v1
kind: StatefulSet

metadata:
  name: mysql
  namespace: production
  labels:
    app: mysql
    tier: database
    version: "8.0"

spec:
  serviceName: mysql-service
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql
        tier: database

      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "mysql-role"

        vault.hashicorp.com/agent-init-first: "true"

        vault.hashicorp.com/agent-requests-cpu: "50m"
        vault.hashicorp.com/agent-requests-mem: "64Mi"

        vault.hashicorp.com/agent-limits-cpu: "100m"
        vault.hashicorp.com/agent-limits-mem: "128Mi"

        vault.hashicorp.com/agent-inject-secret-db-root: "secret/data/mysql"

        vault.hashicorp.com/agent-inject-template-db-root: |
          {{- with secret "secret/data/mysql" -}}
          export MYSQL_ROOT_PASSWORD="{{ .Data.data.root_password }}"
          export MYSQL_PASSWORD="{{ .Data.data.app_password }}"
          export MYSQL_USER="{{ .Data.data.app_user }}"
          {{- end }}

        # Removed: vault.hashicorp.com/secret-volume-path
        # /vault/secrets is the default; the injector webhook owns this volume.

    spec:
      serviceAccountName: vault-auth-sa

      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent

          command:
            - sh
            - -c
            - |
              if [ ! -s /vault/secrets/db-root ]; then
                echo "ERROR: /vault/secrets/db-root is empty or missing. Vault injection failed." >&2
                exit 1
              fi

              source /vault/secrets/db-root

              if [ -z "$MYSQL_ROOT_PASSWORD" ]; then
                echo "ERROR: MYSQL_ROOT_PASSWORD is empty after sourcing Vault secrets." >&2
                exit 1
              fi

              exec docker-entrypoint.sh mysqld

          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mysql-config
                  key: MYSQL_DATABASE

          ports:
            - name: mysql
              containerPort: 3306

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql

            - name: mysql-config-vol
              mountPath: /etc/mysql/conf.d/custom.cnf
              subPath: my.cnf

            - name: mysql-config-vol
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql

            # Removed: vault-secrets volumeMount — injected automatically by the
            # Vault webhook into /vault/secrets on all containers.

          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - --silent
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
                - --silent
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-pvc

        - name: mysql-config-vol
          configMap:
            name: mysql-config

        # Removed: vault-secrets emptyDir volume — owned and injected by the
        # Vault agent injector webhook. Declaring it manually causes a duplicate
        # volume conflict (spec.volumes[n].name: Duplicate value: "vault-secrets").