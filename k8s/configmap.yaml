# ============================================================
# configmap.yaml
#
# Application-level non-sensitive configuration.
#
# Rule: If a value is SECRET → Vault
#       If a value is CONFIG → ConfigMap
#       Never mix them.
#
# These values can be safely committed to git.
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
  labels:
    app: enterprise-app
    managed-by: kubectl
data:
  # ── Application Settings ─────────────────────────────────────────────────
  NODE_ENV:       "production"
  PORT:           "3000"
  LOG_LEVEL:      "info"
  APP_VERSION:    "1.0.0"

  # ── Database Connection (host/port only — credentials come from Vault) ───
  DB_HOST:        "mysql-service"
  DB_PORT:        "3306"
  DB_NAME:        "appdb"

  # ── CORS Configuration ────────────────────────────────────────────────────
  # Update ALLOWED_ORIGINS to match your actual domain
  ALLOWED_ORIGINS: "https://yourdomain.com,https://www.yourdomain.com"

  # ── Feature Flags ─────────────────────────────────────────────────────────
  ENABLE_RATE_LIMIT: "true"
  RATE_LIMIT_MAX:    "100"
  RATE_LIMIT_WINDOW: "60000"

  # ── Observability ─────────────────────────────────────────────────────────
  METRICS_ENABLED:   "true"
  TRACING_ENABLED:   "false"
